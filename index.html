<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message from Imran 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <audio id="bg-music" loop><source src="https://cdn.pixabay.com/download/audio/2022/05/16/audio_017b3eb2b8.mp3" type="audio/mpeg"></audio>
    <div id="falling-elements"></div>

    <main class="chat-container">
        <!-- Chat Header -->
        <header class="chat-header">
            <div class="avatar">I</div>
            <div class="user-info">
                <span class="name">Imran</span>
                <span class="status" id="status">Online</span>
            </div>
        </header>

        <!-- STAGE 0: INTRO MESSAGES -->
        <section id="stage-0" class="stage active">
            <div class="message-thread" id="thread-0">
                <!-- Messages will be injected here by JS -->
            </div>
            <div class="typing-indicator" id="typing-0">Imran is typing...</div>
            <button class="primary-btn hidden" id="btn-0" onclick="startApp()">Tap to Continue ✨</button>
        </section>

        <!-- STAGE 1: MEMORIES -->
        <section id="stage-1" class="stage">
            <div class="message-thread" id="thread-1">
                <!-- Memory cards will appear here as shared "media/messages" -->
            </div>
            <div class="typing-indicator" id="typing-1">Imran is typing...</div>
            <button class="primary-btn hidden" id="btn-1" onclick="goToStage(2)">One last thing...</button>
        </section>

        <!-- STAGE 2: THE PROPOSAL -->
        <section id="stage-2" class="stage">
            <div class="message-thread" id="thread-2"></div>
            <div class="typing-indicator" id="typing-2">Imran is typing...</div>
            <div class="action-buttons hidden" id="btns-2">
                <button class="primary-btn yes-btn" onclick="goToStage(3)">YES 💖</button>
                <button class="secondary-btn no-btn" id="no-btn">NO 🙈</button>
            </div>
        </section>

        <!-- STAGE 3: ACCEPTED -->
        <section id="stage-3" class="stage">
            <div class="final-card">
                <h1 class="romantic-title">YAYYYY ❤️</h1>
                <img src="https://media.tenor.com/y1uH3o8c94gAAAAi/cat-cats.gif" class="final-gif">
                <div class="glass-panel">
                    <h2>The happiest guy alive!</h2>
                    <p>I promise to take care of you, annoy you forever, and send you bicep pics daily 🐱💕</p>
                    <span class="sign-off">- Yours, Imran</span>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
